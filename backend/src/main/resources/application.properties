# Server
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/elearning_platform
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# JWT Secret (override with JWT_SECRET environment variable)
jwt.secret=${JWT_SECRET:elearningplatformsecretkeythatisatleast256bitslong1234567890abcdef}

# CORS
app.cors.allowedOrigins=http://localhost:3000
